job:
  project: dreamdojo
  group: exp1201
  name: libero

checkpoint:
  save_iter: 1000

trainer:
  run_validation: true
  validation_iter: 1000
  max_val_iter: 50
  grad_accum_iter: 1
  callbacks:
    every_n_sample_reg:
      every_n: 1000
      fps: 10   # LIBERO recorded video fps
    every_n_sample_ema:
      every_n: 1000
      fps: 10   # LIBERO recorded video fps
    validation_sample:
      _target_: cosmos_predict2._src.predict2.callbacks.validation_draw_sample.ValidationDrawSample
      n_samples: 1
      guidance: [0]
      fps: 10
      is_ema: true
      do_x0_prediction: false

model_parallel:
  context_parallel_size: 1

model:
  config:
    state_t: 4  # 1 + 12 // 4
    net:
      action_dim: 384
      temporal_compression_ratio: 4
      num_action_per_chunk: 12
      zero_init_action_embedder: false

dataloader_train:
  batch_size: 4

  dataset:
    num_frames: 13
    dataset_path:
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_spatial_dreamdojo
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_object_dreamdojo
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_goal_dreamdojo
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_10_dreamdojo
    data_split: train
    single_base_index: false
    deterministic_uniform_sampling: false

dataloader_val:
  dataset:
    num_frames: 13
    dataset_path:
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_spatial_dreamdojo
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_object_dreamdojo
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_goal_dreamdojo
      - /home/zhiqil/workspace/fxz/DreamDojo/datasets/libero_10_dreamdojo
    data_split: train
    single_base_index: false
